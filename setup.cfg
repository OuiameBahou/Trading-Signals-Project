# ============================================================================
# setup.cfg – Configuration centralisée pour flake8 et pytest
# ============================================================================

[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    build,
    dist,
    *.egg-info,
    data,
    logs
# Ignorer certaines règles peu pertinentes pour un projet académique
ignore =
    E203,  # Whitespace before ':' (conflit avec black)
    W503,  # Line break before binary operator
    E501,  # Line too long (on utilise max-line-length à 120)
per-file-ignores =
    __init__.py: F401  # Imports non utilisés dans les __init__

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    slow: Tests lents (nécessitent le modèle FinBERT)
    integration: Tests d'intégration (nécessitent MongoDB/PostgreSQL)

[coverage:run]
source = src, collectors
omit =
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
show_missing = true
fail_under = 20
